server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/actiontracker}
    username: ${DB_USERNAME:actiontracker}
    password: ${DB_PASSWORD:actiontracker}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  sql:
    init:
      mode: always
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:change-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:change-me}
            scope:
              - email
              - profile
              - openid
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
            user-name-attribute: email

app:
  domain-restriction: digitalchalk.com
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
  owner-email: ${OWNER_EMAIL:owner@digitalchalk.com}
  claude:
    api-key: ${CLAUDE_API_KEY:change-me}
    model: ${CLAUDE_MODEL:claude-sonnet-4-6}
    base-url: https://api.anthropic.com/v1
  gmail:
    from: ${GMAIL_FROM:noreply@digitalchalk.com}
  email:
    enabled: ${EMAIL_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.pcmtexas.actiontracker: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

---
# AWS production profile — activated when SPRING_PROFILES_ACTIVE=prod
spring:
  config:
    activate:
      on-profile: prod

aws:
  region: ${AWS_REGION:us-east-1}
  secrets:
    arn: ${AWS_SECRETS_ARN:}
