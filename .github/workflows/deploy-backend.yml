name: Build & Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Verify (Railway auto-deploys on push)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (skip tests — tests run in separate CI job)
        working-directory: backend
        run: mvn package -DskipTests -q

      - name: Trigger Railway deployment
        if: ${{ secrets.RAILWAY_DEPLOY_HOOK != '' }}
        run: |
          curl -s -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK }}" \
            -o /dev/null -w "Railway deploy hook status: %{http_code}\n"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Backend build failed. Check logs for details."
